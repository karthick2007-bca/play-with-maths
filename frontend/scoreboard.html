<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathWars - Leaderboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a1a; color: white; min-height: 100vh; padding: 80px 20px 40px; }
        body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-image: linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; }
        .back-btn { position: fixed; top: 20px; left: 20px; padding: 8px 18px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #888; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.3s; z-index: 10; }
        .back-btn:hover { color: white; border-color: #6366f1; }
        .container { max-width: 700px; margin: 0 auto; position: relative; z-index: 1; }
        .page-title { text-align: center; margin-bottom: 40px; }
        .page-title h1 { font-size: 40px; font-weight: 900; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .page-title p { color: #555; letter-spacing: 3px; font-size: 12px; margin-top: 6px; }

        /* Your Stats */
        .your-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 40px; }
        .stat-card { background: rgba(15,15,35,0.9); border: 1px solid rgba(99,102,241,0.2); border-radius: 12px; padding: 18px; text-align: center; }
        .stat-val { font-size: 28px; font-weight: 900; }
        .stat-label { font-size: 11px; color: #555; letter-spacing: 1px; margin-top: 4px; }
        .stat-card.easy .stat-val { color: #22c55e; }
        .stat-card.medium .stat-val { color: #f59e0b; }
        .stat-card.hard .stat-val { color: #ef4444; }
        .stat-card.total .stat-val { color: #a855f7; }

        /* Leaderboard */
        .leaderboard-title { font-size: 18px; font-weight: 700; color: #6366f1; letter-spacing: 2px; margin-bottom: 15px; }
        .player-row {
            display: flex; align-items: center; gap: 15px;
            background: rgba(15,15,35,0.9); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; padding: 16px 20px; margin-bottom: 10px;
            transition: all 0.3s;
        }
        .player-row:hover { border-color: rgba(99,102,241,0.3); transform: translateX(4px); }
        .player-row.rank-1 { border-color: rgba(255,215,0,0.4); background: rgba(255,215,0,0.05); }
        .player-row.rank-2 { border-color: rgba(192,192,192,0.4); background: rgba(192,192,192,0.05); }
        .player-row.rank-3 { border-color: rgba(205,127,50,0.4); background: rgba(205,127,50,0.05); }
        .player-row.is-you { border-color: rgba(99,102,241,0.5); background: rgba(99,102,241,0.08); }
        .rank-badge { font-size: 24px; width: 40px; text-align: center; }
        .player-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; background: linear-gradient(135deg, #6366f1, #a855f7); }
        .player-info { flex: 1; }
        .player-name { font-size: 16px; font-weight: 700; }
        .player-scores { font-size: 12px; color: #555; margin-top: 3px; }
        .player-xp { font-size: 22px; font-weight: 900; color: #a855f7; }
        .you-tag { font-size: 11px; background: rgba(99,102,241,0.2); color: #6366f1; border: 1px solid rgba(99,102,241,0.3); border-radius: 10px; padding: 2px 8px; margin-left: 8px; }

        .reset-btn { width: 100%; padding: 14px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 700; letter-spacing: 1px; margin-top: 30px; transition: all 0.3s; }
        .reset-btn:hover { background: rgba(239,68,68,0.2); }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.history.back()">← BACK</button>
    <div class="container">
        <div class="page-title">
            <h1>🏆 LEADERBOARD</h1>
            <p>TOP MATH WARRIORS</p>
        </div>
        <div class="your-stats">
            <div class="stat-card easy"><div class="stat-val" id="easy-score">0</div><div class="stat-label">EASY XP</div></div>
            <div class="stat-card medium"><div class="stat-val" id="medium-score">0</div><div class="stat-label">MEDIUM XP</div></div>
            <div class="stat-card hard"><div class="stat-val" id="hard-score">0</div><div class="stat-label">HARD XP</div></div>
            <div class="stat-card total"><div class="stat-val" id="total-score">0</div><div class="stat-label">TOTAL XP</div></div>
        </div>
        <div class="leaderboard-title">⚔️ RANKINGS</div>
        <div id="leaderboard"></div>
        <button class="reset-btn" onclick="resetScores()">🔄 RESET MY SCORES</button>
    </div>
    <script>
        const currentUser = localStorage.getItem('currentUser') || 'You';
        const easy = parseInt(localStorage.getItem('easyScore')||0);
        const medium = parseInt(localStorage.getItem('mediumScore')||0);
        const hard = parseInt(localStorage.getItem('hardScore')||0);
        document.getElementById('easy-score').textContent = easy;
        document.getElementById('medium-score').textContent = medium;
        document.getElementById('hard-score').textContent = hard;
        document.getElementById('total-score').textContent = easy+medium+hard;

        const players = [
            { name: currentUser, easy, medium, hard, isYou: true },
            { name: 'Alex', easy: 45, medium: 80, hard: 120 },
            { name: 'Sarah', easy: 60, medium: 95, hard: 150 },
            { name: 'Mike', easy: 38, medium: 70, hard: 90 },
            { name: 'Emma', easy: 52, medium: 85, hard: 130 }
        ].map(p => ({ ...p, total: p.easy + p.medium + p.hard }))
         .sort((a, b) => b.total - a.total);

        const medals = ['🥇', '🥈', '🥉'];
        const lb = document.getElementById('leaderboard');
        players.forEach((p, i) => {
            const rank = i + 1;
            lb.innerHTML += `
                <div class="player-row ${rank<=3?'rank-'+rank:''} ${p.isYou?'is-you':''}">
                    <div class="rank-badge">${medals[i] || '#'+rank}</div>
                    <div class="player-avatar">${p.name[0].toUpperCase()}</div>
                    <div class="player-info">
                        <div class="player-name">${p.name}${p.isYou?'<span class="you-tag">YOU</span>':''}</div>
                        <div class="player-scores">Easy: ${p.easy} · Medium: ${p.medium} · Hard: ${p.hard}</div>
                    </div>
                    <div class="player-xp">${p.total} XP</div>
                </div>`;
        });

        function resetScores() {
            if (confirm('Reset all your scores?')) {
                ['easyScore','mediumScore','hardScore'].forEach(k => localStorage.setItem(k, 0));
                location.reload();
            }
        }
    </script>
</body>
</html>
