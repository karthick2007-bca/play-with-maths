<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathWars - Enter the Arena</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        canvas { position: fixed; top: 0; left: 0; z-index: 0; }
        .container {
            position: relative;
            z-index: 1;
            width: 420px;
            background: rgba(15, 15, 35, 0.9);
            border: 1px solid rgba(99, 102, 241, 0.4);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 60px rgba(99, 102, 241, 0.2), inset 0 0 60px rgba(0,0,0,0.3);
            backdrop-filter: blur(20px);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            text-shadow: none;
        }
        .logo p { color: #6366f1; font-size: 13px; letter-spacing: 4px; margin-top: 4px; }
        .tabs {
            display: flex;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 30px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            color: #888;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }
        .tab.active {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }
        .form { display: none; }
        .form.active { display: block; }
        .input-group { position: relative; margin-bottom: 18px; }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 10px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }
        .input-group input:focus {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.1);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }
        .input-group input::placeholder { color: #555; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }
        .btn:hover::before { left: 100%; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(99, 102, 241, 0.5); }
        .btn:active { transform: translateY(0); }
        .message { padding: 10px 15px; border-radius: 8px; margin-top: 15px; font-size: 14px; text-align: center; }
        .success { background: rgba(34, 197, 94, 0.15); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); }
        .error { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .divider { text-align: center; color: #444; margin: 15px 0; font-size: 13px; }
        .floating-nums {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .float-num {
            position: absolute;
            color: rgba(99, 102, 241, 0.15);
            font-size: 24px;
            font-weight: bold;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="floating-nums" id="floatingNums"></div>

    <div class="container">
        <div class="logo">
            <h1>⚔️ MATHWARS</h1>
            <p>ENTER THE ARENA</p>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('signup')">SIGN UP</div>
            <div class="tab" onclick="switchTab('login')">LOGIN</div>
        </div>
        <div id="signup-form" class="form active">
            <div class="input-group">
                <input type="text" id="signup-username" placeholder="⚡ Choose Username">
            </div>
            <div class="input-group">
                <input type="password" id="signup-password" placeholder="🔒 Create Password">
            </div>
            <button class="btn" onclick="signup()">🚀 JOIN THE BATTLE</button>
            <div id="signup-message"></div>
        </div>
        <div id="login-form" class="form">
            <div class="input-group">
                <input type="text" id="login-username" placeholder="⚡ Username">
            </div>
            <div class="input-group">
                <input type="password" id="login-password" placeholder="🔒 Password" onkeypress="if(event.key==='Enter') login()">
            </div>
            <button class="btn" onclick="login()">⚔️ ENTER ARENA</button>
            <div id="login-message"></div>
        </div>
    </div>

    <script>
        // Particle canvas
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        for (let i = 0; i < 80; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 2 + 0.5,
                dx: (Math.random() - 0.5) * 0.5,
                dy: (Math.random() - 0.5) * 0.5,
                alpha: Math.random() * 0.5 + 0.1
            });
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(99,102,241,${p.alpha})`;
                ctx.fill();
                p.x += p.dx; p.y += p.dy;
                if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
            });
            // Connect nearby particles
            particles.forEach((p1, i) => {
                particles.slice(i + 1).forEach(p2 => {
                    const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
                    if (dist < 100) {
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(99,102,241,${0.1 * (1 - dist / 100)})`;
                        ctx.stroke();
                    }
                });
            });
            requestAnimationFrame(drawParticles);
        }
        drawParticles();

        // Floating math numbers
        const nums = ['1+1', '×', '÷', '∑', 'π', '√', '²', '∞', '=', '%'];
        const container = document.getElementById('floatingNums');
        for (let i = 0; i < 15; i++) {
            const el = document.createElement('div');
            el.className = 'float-num';
            el.textContent = nums[Math.floor(Math.random() * nums.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDuration = (Math.random() * 10 + 8) + 's';
            el.style.animationDelay = (Math.random() * 10) + 's';
            el.style.fontSize = (Math.random() * 20 + 16) + 'px';
            container.appendChild(el);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (tab === 'signup' && i === 0) || (tab === 'login' && i === 1));
            });
            document.getElementById('signup-form').classList.toggle('active', tab === 'signup');
            document.getElementById('login-form').classList.toggle('active', tab === 'login');
        }

        function signup() {
            const username = document.getElementById('signup-username').value.trim();
            const password = document.getElementById('signup-password').value;
            if (!username || !password) return showMessage('signup-message', '⚠️ All fields required', 'error');
            const users = JSON.parse(localStorage.getItem('users') || '{}');
            if (users[username]) return showMessage('signup-message', '⚠️ Username taken', 'error');
            users[username] = password;
            localStorage.setItem('users', JSON.stringify(users));
            showMessage('signup-message', '✅ Welcome to the Arena!', 'success');
            setTimeout(() => { localStorage.setItem('currentUser', username); window.location.href = 'main-page.html'; }, 1200);
        }

        function login() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            if (!username || !password) return showMessage('login-message', '⚠️ All fields required', 'error');
            const users = JSON.parse(localStorage.getItem('users') || '{}');
            if (!users[username]) return showMessage('login-message', '⚠️ Username not found', 'error');
            if (users[username] !== password) return showMessage('login-message', '⚠️ Wrong password', 'error');
            showMessage('login-message', '⚔️ Entering Arena...', 'success');
            setTimeout(() => { localStorage.setItem('currentUser', username); window.location.href = 'main-page.html'; }, 1200);
        }

        function showMessage(id, msg, type) {
            const el = document.getElementById(id);
            el.innerHTML = `<div class="message ${type}">${msg}</div>`;
            setTimeout(() => el.innerHTML = '', 3000);
        }

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    </script>
</body>
</html>
